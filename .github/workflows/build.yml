name: Build

# Build debug and release APKs on every push (and PR).
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# One in-flight run per ref; a newer push cancels the older run.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # versionCode = git commit count, so the full history must be present.
      # Signing only kicks in once the keystore secret is configured; until
      # then the release build is produced unsigned and CI still stays green.
      HAS_SIGNING: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Decode release keystore
        if: env.HAS_SIGNING == 'true'
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build debug and release APKs
        env:
          # Empty when no keystore secret is set → build.gradle.kts leaves the
          # release build unsigned.
          SIGNING_KEYSTORE_PATH: ${{ env.HAS_SIGNING == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
