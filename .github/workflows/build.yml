name: Build & Release

# Build debug and release APKs on every push (and PR). Pushes to the default
# branch additionally publish a GitHub Release with both APKs attached.
on:
  push:
  pull_request:
  workflow_dispatch:

# contents: write is needed to create the release and its tag.
permissions:
  contents: write

# One in-flight run per ref; a newer push cancels the older run.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # versionCode = git commit count, so the full history must be present.
      # Signing only kicks in once the keystore secret is configured AND the
      # alias/passwords are valid; otherwise the release build stays unsigned
      # (build.gradle.kts validates and degrades gracefully) and CI stays green.
      HAS_SIGNING: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # Computed once here and reused for the GitHub Release tag/title below.
      # build.gradle.kts derives versionName and the Sentry release
      # (io.sentry.release manifest placeholder) from the same git commit
      # count independently, so all three agree without needing to thread a
      # value through the build step — the Sentry Android Gradle plugin has
      # no env-var hook to receive one.
      - name: Compute version
        run: |
          set -euo pipefail
          VERSION="$(./gradlew -q printVersionName | tail -n1)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Decode release keystore
        if: env.HAS_SIGNING == 'true'
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build debug and release APKs
        env:
          # Empty when no keystore secret is set → build.gradle.kts leaves the
          # release build unsigned.
          SIGNING_KEYSTORE_PATH: ${{ env.HAS_SIGNING == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          # Read by the Sentry Gradle plugin's upload tasks (proguard mappings,
          # source bundle). sentry.properties is gitignored and never present
          # in CI, so auth must come from the environment instead.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # Publish a GitHub Release with both APKs on every push to the default
      # branch. The tag is "v$VERSION" — the same VERSION computed once above,
      # and the same format build.gradle.kts uses for the Sentry release — so
      # GitHub and Sentry always agree on what a given build is called.
      # Re-runs of the same commit re-upload the assets instead of failing on
      # an existing tag.
      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"
          # The release APK is app-release.apk when signed, app-release-unsigned.apk otherwise.
          ASSETS=$(ls app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk)
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" $ASSETS --clobber
          else
            gh release create "$TAG" $ASSETS \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "Automated release for $TAG (commit ${GITHUB_SHA:0:7})."
          fi
